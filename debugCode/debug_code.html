<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Debugging Example</title>
</head>

<body>
    <h1>Debugging Example - Multiple Operations</h1>
    <label for="input1">Enter Number 1 (or character):</label>
    <input type="text" id="input1"><br><br>
    <label for="input2">Enter Number 2 (or character):</label>
    <input type="text" id="input2"><br><br>
    <label for="operation">Select Operation:</label>
    <select id="operation">
        <option value="add">Addition (+)</option>
        <option value="multiply">Multiplication (*)</option>
        <option value="divide">Division (/)</option>
        <option value="all">All Operations Simultaneously</option>
    </select><br><br>
    <button onclick="performOperation()">Perform Operation</button>
    <div id="result"></div>
</body>
<script src="./debug_code.js"></script>

</html>
